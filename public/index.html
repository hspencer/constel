<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>con§tel</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400;500;600;700&family=Sorts+Mill+Goudy:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/tab-sources.css">
  <link rel="stylesheet" href="css/tab-reader.css">
  <link rel="stylesheet" href="css/tab-themes.css">
</head>
<body>
  <!-- Shell principal -->
  <header class="shell-header">
    <h1 class="logo">con<span class="section-sign">§</span>tel <span class="version">0.2.1</span></h1>
    <div class="header-actions">
      <span class="status-msg" id="statusMsg"></span>
      <div class="dropdown" id="bibliotecaDropdown">
        <button class="btn-sm" id="bibliotecaBtn">Biblioteca</button>
        <div class="dropdown-menu" id="bibliotecaMenu">
          <button class="dropdown-item" id="exportBtn">Exportar constelación (ZIP)</button>
          <label class="dropdown-item">
            Importar constelación (ZIP)
            <input type="file" id="importFile" accept=".zip" hidden>
          </label>
          <label class="dropdown-item">
            Concatenar biblioteca (ZIP)
            <input type="file" id="mergeFile" accept=".zip" hidden>
          </label>
        </div>
      </div>
      <button class="btn-icon" id="themeToggle" title="Cambiar tema"><img src="icons/icons_mode-switch.svg" alt="Cambiar tema" width="20" height="20" style="filter: var(--icon-filter)"></button>
    </div>
  </header>

  <!-- Barra de pestañas -->
  <nav class="tabs-bar" role="tablist">
    <button class="tab-btn active" data-tab="sources" role="tab" aria-selected="true">
      <img src="icons/icons_library.svg" class="tab-icon" alt="" /> <span data-i18n="tab.sources">Fuentes</span>
    </button>
    <button class="tab-btn" data-tab="reader" role="tab" aria-selected="false">
      <img src="icons/icons_section.svg" class="tab-icon" alt="" /> <span data-i18n="tab.reader">Lector</span>
    </button>
    <button class="tab-btn" data-tab="themes" role="tab" aria-selected="false">
      <img src="icons/icons_map.svg" class="tab-icon" alt="" /> <span data-i18n="tab.map">Mapa</span>
    </button>
    <span class="tab-source-title" id="tabSourceTitle">
      <span id="readerTitle"></span>
      <button class="btn-icon marks-toggle" id="marksToggle" title="Mostrar/ocultar marcas">
        <img src="icons/icons_eye-open.svg" id="marksToggleIcon" alt="marcas" width="18" height="18">
      </button>
    </span>
  </nav>

  <!-- Paneles de contenido -->
  <main class="tab-panels">
    <section class="tab-panel active" id="panel-sources" role="tabpanel">
      <div class="split-view" data-split="sources">
        <div class="split-left" id="sourcesList">
          <div class="panel-header">
            <h2>Corpus</h2>
            <span class="badge" id="sourcesCount">0</span>
          </div>
          <div class="corpus-search">
            <input type="text" id="corpusSearchInput" data-i18n="sources.search" placeholder="Buscar en todos los textos..." />
          </div>
          <div class="panel-content" id="sourcesListContent"></div>
          <div class="search-results" id="corpusSearchResults" hidden></div>
        </div>
        <div class="split-handle" data-split="sources"></div>
        <div class="split-right" id="sourcePreview">
          <div class="panel-header">
            <h2>Vista previa</h2>
          </div>
          <div class="panel-content" id="sourcePreviewContent">
            <p class="placeholder">Selecciona un texto para ver su contenido</p>
          </div>
        </div>
      </div>
    </section>

    <section class="tab-panel" id="panel-reader" role="tabpanel">
      <div class="reader-layout">
        <!-- Izquierda: glosa cronológica de conceptos -->
        <div class="reader-gloss" id="readerGloss">
          <div class="gloss-scroll" id="readerGlossList"></div>
          <div class="gloss-footer">
            <span class="badge" id="readerConceptCount">0</span> conceptos
          </div>
        </div>
        <!-- Resizer handle -->
        <div class="reader-resizer" id="readerResizer"></div>
        <!-- Minimap vertical angosto -->
        <div class="reader-minimap-strip" id="readerMinimap"></div>
        <!-- Panel de detalle (aparece entre minimap y texto) -->
        <div class="concept-detail-panel" id="conceptDetail" hidden>
          <div class="concept-detail-header">
            <input class="concept-detail-label" id="conceptDetailLabel" type="text" spellcheck="false" />
            <button class="btn-icon" id="conceptDetailClose" title="Cerrar">✕</button>
          </div>
          <div class="concept-detail-excerpts" id="conceptDetailExcerpts"></div>
          <div class="concept-detail-actions">
            <button class="btn-sm btn-danger" id="conceptDetailDelete" data-i18n="reader.delete_concept">Eliminar concepto</button>
            <button class="btn-sm" id="conceptDetailAddExcerpt" data-i18n="reader.add_section">+ Agregar sección</button>
          </div>
        </div>
        <!-- Derecha: texto -->
        <div class="reader-text-panel" id="readerText">
          <div class="panel-content reader-content" id="readerTextContent">
            <p class="placeholder" data-i18n="reader.select_text">Selecciona un texto desde Fuentes para comenzar a leer</p>
          </div>
        </div>
      </div>
    </section>

    <section class="tab-panel" id="panel-themes" role="tabpanel">
      <div class="split-view" data-split="themes">
        <div class="split-left" id="conceptMap">
          <div class="panel-header">
            <h2 data-i18n="map.title">Mapa de conceptos</h2>
            <div class="map-controls">
              <label class="map-control map-mode-switch" title="Modo de visualización">
                <span class="mode-label" data-mode="2d">2D</span>
                <input type="checkbox" id="mapModeToggle">
                <span class="mode-slider"></span>
                <span class="mode-label" data-mode="3d">3D</span>
              </label>
              <label class="map-control" title="Umbral: mostrar links con ≥ N secciones compartidas">
                <span class="control-label">≥</span>
                <input type="range" id="mapThresholdSlider" min="1" max="5" value="1" step="1">
                <span class="control-value" id="mapThresholdValue">1</span>
              </label>
              <label class="map-control" title="Fuerza de atracción entre nodos conectados">
                <span class="control-label">Fuerza</span>
                <input type="range" id="mapStrengthSlider" min="1" max="30" value="5" step="1">
              </label>
              <label class="map-control" title="Mostrar aristas">
                <input type="checkbox" id="mapEdgeToggle" checked>
                <span class="toggle-label">Aristas</span>
              </label>
            </div>
          </div>
          <div class="panel-content map-content" id="mapContainer"></div>
        </div>
        <div class="split-handle" data-split="themes"></div>
        <div class="split-right" id="themeDetail">
          <div class="panel-header">
            <h2 id="themeDetailTitle">Detalle</h2>
          </div>
          <div class="panel-content" id="themeDetailContent">
            <p class="placeholder">Selecciona un concepto o tema en el mapa</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Popup para crear excerpts (oculto por defecto) -->
  <div class="excerpt-popup" id="excerptPopup" hidden>
    <div class="popup-content">
      <input type="text" id="conceptInput" placeholder="Concepto [a]..." autocomplete="off">
      <div class="autocomplete-dropdown" id="autocompleteDropdown" hidden></div>
      <div class="popup-actions">
        <button class="btn-primary btn-sm" id="createExcerpt">Marcar §</button>
        <button class="btn-sm" id="cancelExcerpt" data-i18n="sources.cancel">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- D3.js + JSZip + Three.js + 3D Force Graph via CDN (sin build step) -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.79.1/dist/3d-force-graph.min.js"></script>
  <!-- Módulos JS -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
